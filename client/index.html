<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="google-site-verification" content="YQLL3jzI4DD8QkOacyz9_wgoEqwx_EsodryydVdZeOA" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SketchDB - Collaborative Database Schema Designer</title>
    
    <!-- Design System Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style type="text/tailwindcss">
      /* ═══════════════════════════════════════════════════════════════════
         SKETCHDB DESIGN SYSTEM - "OBSIDIAN GLASS"
         Premium dark SaaS aesthetic - refined, sophisticated, memorable
         ═══════════════════════════════════════════════════════════════════ */
      
      @theme {
        /* Typography Scale */
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Space Grotesk', system-ui, sans-serif;
        
        /* Core Palette - Obsidian Dark */
        --color-void: #09090b;
        --color-abyss: #0c0c0f;
        --color-carbon: #111114;
        --color-graphite: #18181b;
        --color-steel: #27272a;
        --color-chrome: #3f3f46;
        --color-silver: #71717a;
        --color-ghost: #a1a1aa;
        --color-pure: #fafafa;
        
        /* Refined Accent - Single Teal */
        --color-accent: #14b8a6;
        --color-accent-light: #2dd4bf;
        --color-accent-dark: #0d9488;
        --color-accent-muted: rgba(20, 184, 166, 0.15);
        
        /* Semantic Colors - Muted & Professional */
        --color-primary: #14b8a6;
        --color-secondary: #6366f1;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-danger: #ef4444;
        --color-info: #3b82f6;
        
        /* Subtle Effects */
        --glow-primary: 0 0 12px rgba(20, 184, 166, 0.15);
        --glow-soft: 0 0 24px rgba(20, 184, 166, 0.06);
        --shadow-elevated: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
        --shadow-modal: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        
        /* Glass Effect */
        --glass-bg: rgba(17, 17, 20, 0.8);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-highlight: rgba(255, 255, 255, 0.03);
        
        /* Animation Timing */
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in-out-expo: cubic-bezier(0.87, 0, 0.13, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      /* Base Layer */
      @layer base {
        * {
          scrollbar-width: thin;
          scrollbar-color: var(--color-chrome) var(--color-carbon);
        }
        
        *::-webkit-scrollbar {
          width: 8px;
          height: 8px;
        }
        
        *::-webkit-scrollbar-track {
          background: var(--color-carbon);
        }
        
        *::-webkit-scrollbar-thumb {
          background: var(--color-chrome);
          border-radius: 4px;
        }
        
        *::-webkit-scrollbar-thumb:hover {
          background: var(--color-silver);
        }
        
        ::selection {
          background: rgba(20, 184, 166, 0.3);
          color: var(--color-pure);
        }
        
        html {
          font-family: var(--font-body);
          background: var(--color-void);
          color: var(--color-ghost);
        }
        
        body {
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
      }
      
      /* Utility Classes */
      @layer utilities {
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        .font-body { font-family: var(--font-body); }
        
        /* Glass Panel */
        .glass-panel {
          background: var(--glass-bg);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border: 1px solid var(--glass-border);
        }
        
        /* Subtle Gradient Text */
        .gradient-text {
          background: linear-gradient(135deg, var(--color-pure) 0%, var(--color-ghost) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        
        .gradient-text-accent {
          background: linear-gradient(135deg, var(--color-accent-light) 0%, var(--color-accent) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        
        /* Subtle Dot Grid Background */
        .dot-grid {
          background-image: radial-gradient(circle at 1px 1px, var(--color-steel) 1px, transparent 0);
          background-size: 24px 24px;
        }
        
        /* Refined Noise Texture */
        .noise-overlay::before {
          content: '';
          position: absolute;
          inset: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
          opacity: 0.015;
          pointer-events: none;
          mix-blend-mode: overlay;
        }
        
        /* Hover Lift Effect */
        .hover-lift {
          transition: transform 0.3s var(--ease-out-expo), box-shadow 0.3s var(--ease-out-expo);
        }
        .hover-lift:hover {
          transform: translateY(-2px);
          box-shadow: var(--shadow-elevated);
        }
        
        /* Fade In Up Animation */
        .fade-in-up {
          animation: fadeInUp 0.5s var(--ease-out-expo) forwards;
          opacity: 0;
        }
        
        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(16px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        
        /* Scale In Animation */
        .scale-in {
          animation: scaleIn 0.4s var(--ease-spring) forwards;
          opacity: 0;
        }
        
        @keyframes scaleIn {
          from {
            opacity: 0;
            transform: scale(0.95);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
        
        /* Stagger Animation Delays */
        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.3s; }
        
        /* Shimmer Loading Effect */
        .shimmer {
          background: linear-gradient(
            90deg,
            var(--color-graphite) 0%,
            var(--color-steel) 50%,
            var(--color-graphite) 100%
          );
          background-size: 200% 100%;
          animation: shimmer 1.5s ease-in-out infinite;
        }
        
        @keyframes shimmer {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }
        
        /* Pulse Ring Animation for Loaders */
        .pulse-ring {
          animation: pulseRing 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulseRing {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.05); }
        }
      }
      
      /* Component Styles */
      @layer components {
        /* Primary Button */
        .btn-primary {
          font-family: var(--font-display);
          font-weight: 500;
          font-size: 0.875rem;
          letter-spacing: 0.025em;
          padding: 0.625rem 1.25rem;
          background: var(--color-accent);
          color: var(--color-void);
          border-radius: 6px;
          transition: all 0.2s var(--ease-out-expo);
        }
        
        .btn-primary:hover {
          background: var(--color-accent-light);
          box-shadow: var(--glow-primary);
          transform: translateY(-1px);
        }
        
        .btn-primary:active {
          transform: translateY(0);
        }
        
        /* Secondary Button */
        .btn-secondary {
          font-family: var(--font-display);
          font-weight: 500;
          font-size: 0.875rem;
          letter-spacing: 0.025em;
          padding: 0.625rem 1.25rem;
          background: transparent;
          color: var(--color-ghost);
          border: 1px solid var(--color-steel);
          border-radius: 6px;
          transition: all 0.2s var(--ease-out-expo);
        }
        
        .btn-secondary:hover {
          background: var(--color-graphite);
          border-color: var(--color-chrome);
          color: var(--color-pure);
        }
        
        /* Ghost Button */
        .btn-ghost {
          font-family: var(--font-display);
          font-weight: 500;
          font-size: 0.875rem;
          padding: 0.5rem 0.75rem;
          background: transparent;
          color: var(--color-ghost);
          border-radius: 6px;
          transition: all 0.2s var(--ease-out-expo);
        }
        
        .btn-ghost:hover {
          background: var(--color-graphite);
          color: var(--color-pure);
        }
        
        /* Input Field */
        .input-field {
          font-family: var(--font-mono);
          font-size: 0.875rem;
          background: var(--color-carbon);
          border: 1px solid var(--color-steel);
          color: var(--color-pure);
          padding: 0.625rem 0.875rem;
          border-radius: 6px;
          transition: all 0.2s;
        }
        
        .input-field:focus {
          outline: none;
          border-color: var(--color-accent);
          box-shadow: 0 0 0 3px var(--color-accent-muted);
        }
        
        .input-field::placeholder {
          color: var(--color-silver);
        }
        
        /* Card */
        .card {
          background: var(--color-graphite);
          border: 1px solid var(--color-steel);
          border-radius: 8px;
          overflow: hidden;
        }
        
        .card-elevated {
          background: var(--color-graphite);
          border: 1px solid var(--color-steel);
          border-radius: 8px;
          box-shadow: var(--shadow-elevated);
        }
        
        /* Modal/Dialog Base */
        .modal-overlay {
          background: rgba(9, 9, 11, 0.85);
          backdrop-filter: blur(4px);
          -webkit-backdrop-filter: blur(4px);
        }
        
        .modal-content {
          background: var(--color-carbon);
          border: 1px solid var(--color-steel);
          border-radius: 12px;
          box-shadow: var(--shadow-modal);
        }
        
        /* Badge */
        .badge {
          font-family: var(--font-mono);
          font-size: 0.6875rem;
          font-weight: 500;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          padding: 0.25rem 0.5rem;
          border-radius: 4px;
        }
        
        .badge-accent {
          background: var(--color-accent-muted);
          color: var(--color-accent);
          border: 1px solid rgba(20, 184, 166, 0.3);
        }
        
        .badge-neutral {
          background: var(--color-steel);
          color: var(--color-ghost);
        }
        
        /* Divider */
        .divider {
          height: 1px;
          background: var(--color-steel);
        }
        
        .divider-gradient {
          height: 1px;
          background: linear-gradient(90deg, transparent, var(--color-steel), transparent);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="min-h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
